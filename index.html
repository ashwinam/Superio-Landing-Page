<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Superio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="container">
      <div class="left-side">
        <div class="logo">
          <img
            src="https://apusthemes.com/wp-demo/superio-new/wp-content/uploads/2021/03/logo.png"
            alt="logo"
          />
        </div>
        <div class="navbar-menus">
          <ul>
            <li>Home<span class="down-arrow">&#9660;</span></li>
            <li>Find Jobs<span class="down-arrow">&#9660;</span></li>
            <li>Employes<span class="down-arrow">&#9660;</span></li>
            <li>Candidates<span class="down-arrow">&#9660;</span></li>
            <li>Blog<span class="down-arrow">&#9660;</span></li>
            <li>Pages<span class="down-arrow">&#9660;</span></li>
          </ul>
        </div>
      </div>

      <div class="right-side">
        <div class="btns">
          <button class="login-signup">Login/Register</button>
          <button class="jobpost-btn">Job Post</button>
        </div>
        <div class="notification">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            fill="currentColor"
            class="bi bi-bell"
            viewBox="0 0 16 16"
          >
            <path
              d="M8 16a2 2 0 0 0 2-2H6a2 2 0 0 0 2 2M8 1.918l-.797.161A4 4 0 0 0 4 6c0 .628-.134 2.197-.459 3.742-.16.767-.376 1.566-.663 2.258h10.244c-.287-.692-.502-1.49-.663-2.258C12.134 8.197 12 6.628 12 6a4 4 0 0 0-3.203-3.92zM14.22 12c.223.447.481.801.78 1H1c.299-.199.557-.553.78-1C2.68 10.2 3 6.88 3 6c0-2.42 1.72-4.44 4.005-4.901a1 1 0 1 1 1.99 0A5 5 0 0 1 13 6c0 .88.32 4.2 1.22 6"
            />
          </svg>
        </div>
      </div>
    </nav>

    <section>
      <div class="hero-section">
        <div class="left-side">
          <h1 class="hero-text">There Are <span class="number">93,178</span> Postings Here For you!</h1>
          <p class="des">Find Jobs, Employment & Career Opportunities</p>
          <div class="search-inputs">
            <input type="text" placeholder="job title, keywords ..." class="job-keyword">
            <input type="text" placeholder="City or Postcode" class="job-city">
            <button class="btn">Find jobs</button>
          </div>
          <p class="searches">Popular Searches : Designer Developer Web IOS PHP Senior Engineer</p>
        </div>
        <div class="right-side">
          <img src="https://apusthemes.com/wp-demo/superio-new/wp-content/uploads/2021/04/slider1.png" alt="man-image" />
        </div>
      </div>
    </section>
  </body>
</html>
